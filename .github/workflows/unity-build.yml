name: Unity Build

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE_FREE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL_FREE }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: StandaloneWindows64

      - name: Save build
        uses: actions/upload-artifact@v4
        with:
          name: Build
          path: build
